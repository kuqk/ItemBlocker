name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Read version from pom.xml
        id: version
        shell: bash
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog_path = Path("CHANGELOG.md")
          fallback = f"See CHANGELOG.md for ItemBlocker {version}."

          if not changelog_path.exists():
            notes = fallback
          else:
            text = changelog_path.read_text(encoding="utf-8")
            pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*$\n(?P<body>.*?)(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
            )
            match = pattern.search(text)
            if match:
              notes = match.group(0).strip()
            else:
              notes = fallback

          Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write("body<<EOF\n")
            fh.write(notes + "\n")
            fh.write("EOF\n")
          PY

      - name: Check if GitHub release already exists
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists. Skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        if: steps.release.outputs.exists != 'true'
        run: mvn -B -ntp clean package

      - name: Publish GitHub release
        if: steps.release.outputs.exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            "target/ItemBlocker-${{ steps.version.outputs.version }}.jar" \
            --title "ItemBlocker v${{ steps.version.outputs.version }}" \
            --target "${GITHUB_SHA}" \
            --notes-file release-notes.md
