#
#           ItemBlocker Configuration

# Available languages: en, pl, de, es, fr, it
language: "en"

messages:
  # Delay between repeated block messages sent to one player.
  cooldown-ms: 1200

bypass:
  enabled: true

  # This permission skips every check in the plugin.
  default-permission: "itemblocker.bypass"

  # Available per-action bypass permissions:
  # - itemblocker.bypass.crafting
  # - itemblocker.bypass.pickup
  # - itemblocker.bypass.drop
  # - itemblocker.bypass.use
  # - itemblocker.bypass.place
  # - itemblocker.bypass.armor
  # - itemblocker.bypass.inventory
  # - itemblocker.bypass.hopper

  per-action:
    enabled: true

    prefix: "itemblocker.bypass."
