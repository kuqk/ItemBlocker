name: Publish Modrinth

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      MODRINTH_SUMMARY: ${{ vars.MODRINTH_SUMMARY }}
      MODRINTH_LOADERS: ${{ vars.MODRINTH_LOADERS }}
      MODRINTH_GAME_VERSIONS: ${{ vars.MODRINTH_GAME_VERSIONS }}
      MODRINTH_VERSION_TYPE: ${{ vars.MODRINTH_VERSION_TYPE }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Read version from pom.xml
        id: version
        shell: bash
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog_path = Path("CHANGELOG.md")
          fallback = f"See CHANGELOG.md for ItemBlocker {version}."

          if not changelog_path.exists():
            notes = fallback
          else:
            text = changelog_path.read_text(encoding="utf-8")
            pattern = re.compile(
              rf"^## \[{re.escape(version)}\].*$\n(?P<body>.*?)(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
            )
            match = pattern.search(text)
            if match:
              notes = match.group(0).strip()
            else:
              notes = fallback

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write("body<<EOF\n")
            fh.write(notes + "\n")
            fh.write("EOF\n")
          PY

      - name: Read GitHub release data
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::GitHub release $TAG was not found. Run the Release workflow first or create the release manually."
            exit 1
          fi

          {
            echo "tag=${TAG}"
            echo "body<<EOF"
            gh release view "$TAG" --json body --jq '.body'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Modrinth configuration
        shell: bash
        run: |
          if [ -z "${MODRINTH_PROJECT_ID}" ]; then
            echo "::error::Missing repository variable MODRINTH_PROJECT_ID. Set it in Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

          if [ -z "${MODRINTH_TOKEN}" ]; then
            echo "::error::Missing repository secret MODRINTH_TOKEN. Set it in Settings -> Secrets and variables -> Actions -> Secrets."
            exit 1
          fi

          if [ -z "${MODRINTH_SUMMARY}" ]; then
            echo "::notice::MODRINTH_SUMMARY is not set. Workflow will use plugin.yml description, then built-in fallback text."
          fi

          if [ -z "${MODRINTH_LOADERS}" ]; then
            echo "::notice::MODRINTH_LOADERS is not set. Workflow will use default loaders: folia, paper, purpur, spigot."
          fi

          if [ -z "${MODRINTH_GAME_VERSIONS}" ]; then
            echo "::notice::MODRINTH_GAME_VERSIONS is not set. Workflow will auto-resolve versions from plugin.yml api-version and then force-add 26.1."
          fi

          if [ -z "${MODRINTH_VERSION_TYPE}" ]; then
            echo "::notice::MODRINTH_VERSION_TYPE is not set. Workflow will use default value: release."
          fi

      - name: Resolve Modrinth project identity
        id: project
        shell: bash
        run: |
          PROJECT_RESPONSE="$(curl --silent --show-error "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}")"
          PROJECT_ID="$(echo "${PROJECT_RESPONSE}" | jq -r '.id // empty')"
          PROJECT_SLUG="$(echo "${PROJECT_RESPONSE}" | jq -r '.slug // empty')"

          if [ -z "${PROJECT_ID}" ]; then
            echo "::error::Could not resolve MODRINTH_PROJECT_ID='${MODRINTH_PROJECT_ID}' to a real Modrinth project."
            echo "::group::Modrinth project lookup response"
            echo "${PROJECT_RESPONSE}"
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice::Resolved Modrinth project '${PROJECT_SLUG}' with canonical ID '${PROJECT_ID}'."

          {
            echo "id=${PROJECT_ID}"
            echo "slug=${PROJECT_SLUG}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Modrinth metadata
        id: metadata
        shell: bash
        run: |
          PLUGIN_YML="src/main/resources/plugin.yml"

          SUMMARY="${MODRINTH_SUMMARY}"
          if [ -z "${SUMMARY}" ] && [ -f "${PLUGIN_YML}" ]; then
            SUMMARY="$(sed -nE 's/^description:[[:space:]]*"?([^"]*)"?$/\1/p' "${PLUGIN_YML}" | head -n 1)"
          fi
          if [ -z "${SUMMARY}" ]; then
            SUMMARY="Flexible Minecraft item restriction plugin with a default section, presets and multi-language support"
          fi

          LOADERS="${MODRINTH_LOADERS}"
          if [ -z "${LOADERS}" ]; then
            LOADERS='["folia","paper","purpur","spigot"]'
          fi

          GAME_VERSIONS="${MODRINTH_GAME_VERSIONS}"
          if [ -z "${GAME_VERSIONS}" ] && [ -f "${PLUGIN_YML}" ]; then
            API_VERSION="$(sed -nE 's/^api-version:[[:space:]]*"?([^"]*)"?$/\1/p' "${PLUGIN_YML}" | head -n 1)"
            VERSION_MANIFEST="$(curl --fail --silent --show-error https://launchermeta.mojang.com/mc/game/version_manifest_v2.json || true)"
            if [ -n "${VERSION_MANIFEST}" ]; then
              GAME_VERSIONS="$(echo "${VERSION_MANIFEST}" | jq -c --arg api "${API_VERSION}" '
                [
                  .versions[]
                  | select(.type == "release")
                  | .id
                  | select(. == $api or startswith($api + "."))
                ] | unique'
              )"
            fi
            if [ -z "${GAME_VERSIONS}" ] || [ "${GAME_VERSIONS}" = "[]" ]; then
              GAME_VERSIONS='["1.21","26.1"]'
            fi
          fi
          if [ -z "${GAME_VERSIONS}" ]; then
            GAME_VERSIONS='["1.21","26.1"]'
          fi
          GAME_VERSIONS="$(echo "${GAME_VERSIONS}" | jq -c '. + ["26.1"] | unique')"

          VERSION_TYPE="${MODRINTH_VERSION_TYPE:-release}"

          {
            echo "summary<<EOF"
            echo "${SUMMARY}"
            echo "EOF"
            echo "loaders<<EOF"
            echo "${LOADERS}"
            echo "EOF"
            echo "game_versions<<EOF"
            echo "${GAME_VERSIONS}"
            echo "EOF"
            echo "version_type=${VERSION_TYPE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check Modrinth version state
        id: version_state
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSIONS_RESPONSE="$(curl --silent --show-error "https://api.modrinth.com/v2/project/${{ steps.project.outputs.id }}/version")"

          if ! echo "${VERSIONS_RESPONSE}" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::Could not read existing Modrinth versions for project ${{ steps.project.outputs.id }}."
            echo "::group::Modrinth versions lookup response"
            echo "${VERSIONS_RESPONSE}"
            echo "::endgroup::"
            exit 1
          fi

          if echo "${VERSIONS_RESPONSE}" | jq -e --arg version "${VERSION}" '.[] | select(.version_number == $version)' >/dev/null 2>&1; then
            echo "::notice::Modrinth version ${VERSION} already exists. Project description will still be synced, but version upload will be skipped."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        run: mvn -B -ntp clean package

      - name: Sync Modrinth project description
        shell: bash
        env:
          RESOLVED_SUMMARY: ${{ steps.metadata.outputs.summary }}
        run: |
          modrinth_api() {
            local method="$1"
            local url="$2"
            local payload_file="$3"
            local content_type="${4:-application/json}"
            local response_file
            response_file="$(mktemp)"

            local http_code
            http_code="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
              -X "$method" "$url" \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              --data "@${payload_file}")"

            if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
              echo "::error::Modrinth API request failed (${method} ${url}) with HTTP ${http_code}."
              echo "::group::Modrinth response body"
              cat "$response_file"
              echo
              echo "::endgroup::"
              rm -f "$response_file"
              exit 1
            fi

            rm -f "$response_file"
          }

          BODY_CONTENT="$(cat README.md)"

          jq -n \
            --arg body "$BODY_CONTENT" \
            --arg description "$RESOLVED_SUMMARY" \
            '{body: $body, description: $description}' > modrinth-project.json

          modrinth_api \
            PATCH \
            "https://api.modrinth.com/v2/project/${{ steps.project.outputs.id }}" \
            modrinth-project.json

      - name: Publish release to Modrinth
        if: steps.version_state.outputs.exists != 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ steps.project.outputs.id }}
          version: ${{ steps.version.outputs.version }}
          name: ItemBlocker ${{ steps.version.outputs.version }}
          changelog: ${{ steps.notes.outputs.body }}
          files: '["target/ItemBlocker-${{ steps.version.outputs.version }}.jar"]'
          loaders: ${{ steps.metadata.outputs.loaders }}
          game-versions: ${{ steps.metadata.outputs.game_versions }}
          status: listed
          channel: ${{ steps.metadata.outputs.version_type }}
