#
#                ItemBlocker Presets

# Example presets.
presets:
  survival:
    description: "Example survival preset."
    reason: "&cThis item is disabled on survival worlds."

    items:
      COMMAND_BLOCK:
        actions: all
        # Available actions:
        # crafting, pickup, drop, use, place, armor, inventory, hopper
        worlds:
          # Use 'all' for every world or list only blocked worlds.
          # Example worlds: world, world_nether, world_the_end, spawn
          - world
          - world_nether

      SPAWNER:
        actions:
          - crafting
          - pickup
          - drop
          - use
          - place
          - inventory
          - hopper
        worlds: all

      ELYTRA:
        actions:
          - use
        worlds:
          # Use 'all' for every world or list only blocked worlds.
          # Example worlds: world, world_nether, world_the_end, spawn
          - world
