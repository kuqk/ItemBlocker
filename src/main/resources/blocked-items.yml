#             ItemBlocker Blocked Items

# Example default rules.
default:
  reason: "&cThis item is blocked globally by the server team."

  items:
    TNT:
      actions: all
      # Available actions:
      # crafting, pickup, drop, use, place, armor, inventory, hopper
      worlds:
        # Use 'all' for every world or list only blocked worlds.
        # Example worlds: world, world_nether, world_the_end, spawn
        - world
        - world_nether

    BEDROCK:
      actions: all
      # Available actions:
      # crafting, pickup, drop, use, place, armor, inventory, hopper
      worlds: all
