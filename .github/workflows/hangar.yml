name: Publish Hangar

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      HANGAR_SLUG: ${{ vars.HANGAR_SLUG }}
      HANGAR_CHANNEL: ${{ vars.HANGAR_CHANNEL }}
      HANGAR_PLATFORM_DEPENDENCIES: ${{ vars.HANGAR_PLATFORM_DEPENDENCIES }}
      HANGAR_PLUGIN_DEPENDENCIES: ${{ vars.HANGAR_PLUGIN_DEPENDENCIES }}
      HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Read version from pom.xml
        id: version
        shell: bash
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read GitHub release data
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::GitHub release $TAG was not found. Run the Release workflow first or create the release manually."
            exit 1
          fi

          {
            echo "tag=${TAG}"
            echo "body<<EOF"
            gh release view "$TAG" --json body --jq '.body'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Hangar configuration
        shell: bash
        run: |
          if [ -z "${HANGAR_API_TOKEN}" ]; then
            echo "::error::Missing repository secret HANGAR_API_TOKEN. Set it in Settings -> Secrets and variables -> Actions -> Secrets."
            exit 1
          fi

          if [ -z "${HANGAR_SLUG}" ]; then
            echo "::notice::HANGAR_SLUG is not set. Workflow will use repository name as slug: ${GITHUB_REPOSITORY#*/}."
          fi

          if [ -z "${HANGAR_CHANNEL}" ]; then
            echo "::notice::HANGAR_CHANNEL is not set. Workflow will use default channel: Release."
          fi

          if [ -z "${HANGAR_PLATFORM_DEPENDENCIES}" ]; then
            echo "::notice::HANGAR_PLATFORM_DEPENDENCIES is not set. Workflow will build PAPER platform dependencies from plugin.yml api-version and add 26.1."
          fi

          if [ -z "${HANGAR_PLUGIN_DEPENDENCIES}" ]; then
            echo "::notice::HANGAR_PLUGIN_DEPENDENCIES is not set. Workflow will publish without extra plugin dependencies."
          fi

      - name: Resolve Hangar metadata
        id: metadata
        shell: bash
        run: |
          PLUGIN_YML="src/main/resources/plugin.yml"

          SLUG="${HANGAR_SLUG:-${GITHUB_REPOSITORY#*/}}"
          CHANNEL="${HANGAR_CHANNEL:-Release}"
          PLATFORM_DEPENDENCIES="${HANGAR_PLATFORM_DEPENDENCIES}"
          PLUGIN_DEPENDENCIES="${HANGAR_PLUGIN_DEPENDENCIES}"

          if [ -z "${PLATFORM_DEPENDENCIES}" ] && [ -f "${PLUGIN_YML}" ]; then
            API_VERSION="$(sed -nE 's/^api-version:[[:space:]]*"?([^"]*)"?$/\1/p' "${PLUGIN_YML}" | head -n 1)"
            if [ -n "${API_VERSION}" ]; then
              PLATFORM_DEPENDENCIES="{\"PAPER\":[\"${API_VERSION}.x\",\"26.1\"]}"
            fi
          fi

          if [ -z "${PLATFORM_DEPENDENCIES}" ]; then
            PLATFORM_DEPENDENCIES='{"PAPER":["1.21.x","26.1"]}'
          fi

          {
            echo "slug=${SLUG}"
            echo "channel=${CHANNEL}"
            echo "platform_dependencies<<EOF"
            echo "${PLATFORM_DEPENDENCIES}"
            echo "EOF"
            echo "plugin_dependencies<<EOF"
            echo "${PLUGIN_DEPENDENCIES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build plugin
        run: mvn -B -ntp clean package

      - name: Publish release to Hangar
        uses: milkdrinkers/Hangar-Publish@v2
        with:
          api_token: ${{ secrets.HANGAR_API_TOKEN }}
          slug: ${{ steps.metadata.outputs.slug }}
          version: ${{ steps.version.outputs.version }}
          channel: ${{ steps.metadata.outputs.channel }}
          description: ${{ steps.release.outputs.body }}
          files: |
            [
              {
                "path": "target/ItemBlocker-${{ steps.version.outputs.version }}.jar",
                "platforms": ["PAPER"]
              }
            ]
          # Hangar uploads this plugin under PAPER platform metadata.
          # The same jar is still intended to run on Folia, Paper, Purpur and Spigot.
          plugin_dependencies: ${{ steps.metadata.outputs.plugin_dependencies }}
          platform_dependencies: ${{ steps.metadata.outputs.platform_dependencies }}
